<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 675" role="img" aria-labelledby="title desc">
  <title id="title">On-demand agent-native interaction surface thumbnail</title>
  <desc id="desc">An original abstract diagram showing user intent, an agent, and a generated task surface.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfaf7" />
      <stop offset="0.58" stop-color="#f4eee7" />
      <stop offset="1" stop-color="#eef1f2" />
    </linearGradient>
    <linearGradient id="surface" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f2ede6" />
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 Z" fill="#9a6b45" />
    </marker>
  </defs>

  <rect width="900" height="675" fill="url(#bg)" />
  <rect x="42" y="42" width="816" height="591" fill="none" stroke="#d9cabc" stroke-width="2" />

  <text x="92" y="116" fill="#9b9087" font-family="Arial, sans-serif" font-size="32">agent-native interaction</text>
  <text x="92" y="172" fill="#252525" font-family="Arial, sans-serif" font-size="58" font-weight="700">surface on demand</text>

  <g transform="translate(92 324)">
    <rect width="180" height="132" fill="#ffffff" stroke="#d9cabc" stroke-width="3" />
    <text x="32" y="56" fill="#252525" font-family="Arial, sans-serif" font-size="31" font-weight="700">intent</text>
    <rect x="32" y="84" width="74" height="12" fill="#c8d0d1" />
    <rect x="32" y="108" width="112" height="12" fill="#d9cabc" />
  </g>

  <g transform="translate(362 286)">
    <rect width="184" height="208" fill="#efe8e1" stroke="#cfb9a7" stroke-width="3" />
    <text x="39" y="74" fill="#252525" font-family="Arial, sans-serif" font-size="36" font-weight="700">agent</text>
    <circle cx="92" cy="126" r="30" fill="#4fd8c6" opacity="0.9" />
    <path d="M79 126 L89 136 L108 112" fill="none" stroke="#252525" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <g transform="translate(636 252)">
    <rect width="190" height="276" fill="url(#surface)" stroke="#d9cabc" stroke-width="3" />
    <text x="30" y="60" fill="#252525" font-family="Arial, sans-serif" font-size="33" font-weight="700">surface</text>
    <rect x="32" y="94" width="126" height="30" fill="#f8f6f3" stroke="#d9cabc" stroke-width="3" />
    <rect x="32" y="150" width="54" height="42" fill="#f1e7dc" stroke="#cfb9a7" stroke-width="3" />
    <rect x="106" y="150" width="54" height="42" fill="#ffffff" stroke="#d9cabc" stroke-width="3" />
    <rect x="32" y="224" width="118" height="12" fill="#c8d0d1" />
  </g>

  <path d="M286 392 C314 392, 332 392, 350 392" fill="none" stroke="#9a6b45" stroke-width="5" marker-end="url(#arrow)" />
  <path d="M560 392 C590 392, 606 392, 624 392" fill="none" stroke="#9a6b45" stroke-width="5" marker-end="url(#arrow)" />
  <path d="M724 560 C586 622, 322 617, 184 494" fill="none" stroke="#879799" stroke-width="5" opacity="0.65" />
</svg>
