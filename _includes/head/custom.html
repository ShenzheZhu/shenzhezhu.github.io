<!-- Auto target external links -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Get current domain
  var currentDomain = window.location.hostname;
  
  // Get all links
  var links = document.querySelectorAll('a[href]');
  
  links.forEach(function(link) {
    var href = link.getAttribute('href');
    
    // Skip if it's already set to _blank or _self
    if (link.getAttribute('target')) {
      return;
    }
    
    // Check if it's an external link
    if (href.startsWith('http://') || href.startsWith('https://')) {
      try {
        var linkDomain = new URL(href).hostname;
        if (linkDomain !== currentDomain) {
          // External link - open in new tab
          link.setAttribute('target', '_blank');
          link.setAttribute('rel', 'noopener noreferrer');
        }
      } catch (e) {
        // If URL parsing fails, treat as external
        link.setAttribute('target', '_blank');
        link.setAttribute('rel', 'noopener noreferrer');
      }
    }
    // Internal links (relative paths, anchors) will open in same tab by default
  });
});
</script>
